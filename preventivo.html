<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiedi un Preventivo – Video House Club</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR DINAMICA -->
    <div id="sidebar"></div>

    <main class="content">

        <section class="services">
            <h2>Richiedi un preventivo</h2>

            <form class="form-preventivo">

                <label>Nome e Cognome</label>
                <input type="text" required>

                <label>Email</label>
                <input type="email" required>

                <label>Telefono (opzionale)</label>
                <input type="text">

                <label>Tipo di servizio</label>
                <select required>
                    <option value="">Seleziona un servizio</option>
                    <option>Riversamento VHS</option>
                    <option>Digitalizzazione Super8</option>
                    <option>Montaggio Video</option>
                    <option>Restauro digitale</option>
                </select>

                <label>Descrizione del materiale</label>
                <textarea rows="4" required></textarea>

                <label>Quantità</label>
                <input type="number" min="1">

                <button type="submit">Invia richiesta</button>

            </form>

        </section>

    </main>

    <!-- SCRIPT PER CARICARE LA SIDEBAR -->
    <script>
    fetch("sidebar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("sidebar").innerHTML = data;

        const toggle = document.querySelector('.submenu-toggle');
        const submenu = document.querySelector('.submenu');

        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        });
      });
    </script>

</body>
</html>
