<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti – Video House Club</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- SIDEBAR DINAMICA -->
    <div id="sidebar"></div>

    <main class="content">

        <section class="services">
            <h2>Contatti</h2>

            <div class="contatti-box">
                <h3>📍 Indirizzo</h3>
                <p>Via Esempio 123<br>00100 Roma (RM)</p>

                <h3>📞 Telefono</h3>
                <p><a href="tel:+390612345678">06 1234 5678</a></p>

                <h3>📧 Email</h3>
                <p><a href="mailto:info@videohouseclub.it">info@videohouseclub.it</a></p>

                <h3>🕒 Orari</h3>
                <p>Lunedì – Sabato<br>09:00 – 19:00</p>
            </div>

        </section>

    </main>

    <!-- SCRIPT PER CARICARE LA SIDEBAR -->
    <script>
    fetch("sidebar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("sidebar").innerHTML = data;

        const toggle = document.querySelector('.submenu-toggle');
        const submenu = document.querySelector('.submenu');

        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        });
      });
    </script>

</body>
</html>
